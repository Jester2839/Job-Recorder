<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Recorder</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-section" class="auth-wrapper">
        <h1 class="auth-title">Job Recorder</h1>
        <div class="card auth-card">
            <div class="auth-form">
                <input type="email" id="email" placeholder="Tvůj e-mail">
                
                <div class="password-wrapper">
                    <input type="password" id="password" class="password-input" placeholder="Heslo">
                    <button id="toggle-password-btn" class="btn-icon password-toggle-btn" type="button" title="Zobrazit heslo">
                        <i class="ph ph-eye" id="toggle-password-icon"></i>
                    </button>
                </div>
                
                <button id="login-btn" class="btn btn-ghost">Přihlásit se</button>
            </div>
            <a href="#" class="auth-link" onclick="showToast('Registrace zatím není spuštěna.', 'warning')">Nemáš účet? Zaregistruj se</a>
            <p id="login-error" class="hidden text-danger mt-15">Špatné jméno nebo heslo.</p>
        </div>
    </div>

    <div id="app-section" class="hidden">

        <header class="app-header">
            <h1 class="app-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 87.66 75.31" width="1.2em" height="1.2em" fill="currentColor">
                    <path d="M78.39,39.11c3.15-1.31,5.5-3.21,7-5.65,1.51-2.46,2.27-5.13,2.27-7.94v-2.52c0-2.66-.49-5.18-1.45-7.5-.96-2.31-2.37-4.38-4.19-6.13-1.82-1.75-4.13-3.15-6.85-4.15-2.75-1.01-6-1.52-9.65-1.52h-11.26v9.34h-6.31v37.49c0,7.89-2.19,14.02-6.51,18.23-.95.93-1.99,1.73-3.1,2.46v4.1h11.88v-27.76h16.98c2.33,0,4.06.65,5.13,1.94,1.03,1.23,1.55,2.83,1.55,4.74v21.08h11.88v-24.45c0-2.22-.62-4-1.9-5.43-1.28-1.44-2.98-2.26-5.2-2.51l-.89-.1v-3.45l.62-.26ZM75.78,26.26c0,3.16-1,5.65-2.96,7.42-1.93,1.74-4.74,2.62-8.35,2.62h-14.25V14.95h14.25c3.63,0,6.45,1,8.39,2.98,1.93,1.97,2.92,4.35,2.92,7.06v1.26ZM38.34,68.78c-.32.24-.66.47-1,.69-.33.22-.66.42-1,.62-3.44,1.98-7.66,2.99-12.63,2.99-3.59,0-6.88-.5-9.78-1.47-2.87-.96-5.36-2.42-7.42-4.31-2.06-1.89-3.67-4.25-4.8-7-1.14-2.77-1.71-6.06-1.71-9.77v-5.94h11.88v5.94c0,3.55,1.02,6.39,3.02,8.43,2.01,2.05,4.83,3.09,8.39,3.09,3.36,0,6.02-1.03,7.93-3.05,1.89-2.01,2.85-4.85,2.85-8.47V11.04h-7.57V0h25.76v11.04h-6.31v39.49c0,7.33-1.99,12.98-5.9,16.79-.54.52-1.11,1.01-1.71,1.46ZM51.22,18.71h20.4v2h-20.4v-2ZM51.22,24.62h20.4v2h-20.4v-2ZM51.22,30.54h20.4v2h-20.4v-2Z" />
                </svg>
                <!-- <img src="https://www.aprispro.cz/wp-content/uploads/2022/08/LOGO-MENU-1.png" alt="" style="height: 40px; width: auto;"> -->
            </h1>
            
            <h2 class="user-name text-truncate">Jméno Brigádníka</h2>
            
            <div class="header-actions desktop-only-flex">
                <button id="theme-toggle" class="btn-icon" title="Změnit motiv"><i class="ph ph-moon" id="theme-icon"></i></button>

                <div class="relative-wrapper">
                    <button id="user-menu-btn" class="btn-icon" title="Můj profil"><i class="ph ph-user-circle"></i></button>
                    <div id="user-dropdown" class="card-small filter-dropdown hidden">
                        <div class="dropdown-header">
                            <div class="flex-center-gap">
                                <i class="ph ph-user-circle icon-xl-accent"></i>
                                <strong>Jméno brigádníka</strong>
                            </div>
                            <button id="close-user-cross" class="btn-icon"><i class="ph ph-x"></i></button>
                        </div>
                        <button class="btn btn-ghost"><i class="ph ph-pencil-simple"></i> Upravit profil</button>
                        <button id="logout-btn" class="btn btn-danger"><i class="ph ph-sign-out"></i> Odhlásit se</button>
                    </div>
                </div>
            </div>

            <button id="hamburger-btn" class="btn-icon mobile-only"><i class="ph ph-list icon-burger-size"></i></button>
        </header>

        <main class="main-container">
            
            <div class="global-actions">
                <button id="open-add-modal-btn" class="btn btn-accent btn-lg">
                    <i class="ph ph-plus-circle"></i> <span class="btn-text ">Přidat záznam</span>
                </button>
                <button id="export-btn" class="btn btn-ghost btn-lg">
                    <!-- <span class="export-text-mobile">Export </span> -->
                    <i class="ph ph-file-xls"></i> 
                    <span class="export-text-desktop">Exportovat do .xlsx</span>
                </button>
            </div>

            <div class="main-grid">
                
                <div class="records-section card">
                    
                    <div class="toolbar-header">
                        <div class="search-wrapper">
                            <input type="text" id="searchInput" class="search-input hidden-search" placeholder="Hledat...">
                            <button id="search-toggle-btn" class="btn-icon" title="Hledat"><i class="ph ph-magnifying-glass"></i></button>
                        </div>
                        <button id="sort-toggle-btn" class="btn-icon" title="Seřadit" data-sort="desc">
                            <i class="ph ph-sort-descending" id="sort-icon"></i>
                        </button>
                        
                        <div class="relative-wrapper">
                            <button id="filter-toggle-btn" class="btn-icon" title="Filtry">
                                <i class="ph ph-funnel"></i>
                                <span id="filter-indicator" class="hidden filter-indicator-dot"></span>
                            </button>
                            
                            <div id="filter-dropdown" class="card-small filter-dropdown hidden">
                                <div class="dropdown-header">
                                    <h4>Nastavení filtrů</h4>
                                    <button id="close-filter-cross" class="btn-icon"><i class="ph ph-x"></i></button>
                                </div>
                                
                                <div class="form-group">
                                    <input type="text" id="monthFilter" placeholder="Měsíc a rok..." onfocus="(this.type='month')" onblur="if(!this.value) this.type='text'">
                                </div>
                                
                                <div class="form-group">
                                    <input type="text" id="exactDateFilter" placeholder="Konkrétní den..." onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'">
                                </div>
                                
                                <div class="form-group">
                                    <input type="text" id="activityFilter" placeholder="Činnost (např. ostatní)">
                                </div>
                                
                                <button id="clear-filter-btn" class="btn btn-ghost"><i class="ph ph-x"></i> Zrušit filtry</button>
                            </div>
                        </div>
                    </div>

                    <div id="records-list"></div>
                </div>

                <aside id="sidebar-stats" class="stats-sidebar">
                    <div class="card" id="card-current-stats">
                        <div class="dropdown-header">
                            <h3><i class="ph ph-chart-pie-slice"></i> Aktuální přehled</h3>
                            <button class="btn-icon mobile-only close-stats-mobile-btn"><i class="ph ph-x"></i></button>
                        </div>
                        <div class="stat-row">
                            <span class="text-secondary">Záznamů</span>
                            <strong id="stat-count">0</strong>
                        </div>
                        <div class="stat-row">
                            <span class="text-secondary">Odpracováno</span>
                            <strong id="stat-hours" style="color: var(--text-primary);">0 h</strong>
                        </div>
                        <div class="stat-row">
                            <span class="text-secondary">Výdělek</span>
                            <strong id="stat-money" style="color: var(--accent-color);">0 Kč</strong>
                        </div>
                    </div>

                    <div class="card" id="card-yearly-stats">
                        <div class="dropdown-header">
                            <h3><i class="ph ph-calendar-star"></i> Roční souhrny</h3>
                            <button class="btn-icon mobile-only close-stats-mobile-btn"><i class="ph ph-x"></i></button>
                        </div>
                        <div id="yearly-summary-list"></div>
                    </div>
                </aside>

            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden">Uloženo!</div>

    <div id="add-modal" class="modal-overlay hidden"> 
        <div class="modal-content modal-solid"> 
            <div class="dropdown-header">
                <h3><i class="ph ph-plus-circle"></i> Nový záznam</h3>
                <button id="close-add-cross" class="btn-icon"><i class="ph ph-x"></i></button>
            </div>
            
            <input type="text" id="dateInput" placeholder="Vyber datum..." onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'">
            <input type="number" id="hoursInput" placeholder="Počet hodin" step="0.5">
            
            <div class="form-group">
                <input type="text" id="activityInput" placeholder="Činnost (např. ostatní)">
                <div class="quick-tags-wrapper" id="quick-tags">
                    <span class="badge" onclick="document.getElementById('activityInput').value='ostatní'">ostatní</span>
                </div>
            </div>
            
            <input type="text" id="descInput" placeholder="Co jsi dělal? (Poznámka)">
            
            <div class="header-actions modal-actions">
                <button id="close-add-btn" class="btn">Zrušit</button>
                <button id="add-record-btn" class="btn btn-ghost">Uložit záznam</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content modal-solid">
            <div class="dropdown-header">
                <h3><i class="ph ph-pencil-simple"></i> Upravit záznam</h3>
                <button id="close-edit-cross" class="btn-icon"><i class="ph ph-x"></i></button>
            </div>
            <input type="date" id="editDateInput">
            <input type="number" id="editHoursInput" placeholder="Počet hodin" step="0.5">
            <input type="text" id="editActivityInput" placeholder="Činnost (např. ostatní, úklid)">
            <input type="text" id="editDescInput" placeholder="Co jsi dělal?">
            <div class="header-actions modal-actions">
                <button id="close-edit-btn" class="btn">Zrušit</button>
                <button id="save-edit-btn" class="btn btn-ghost">Uložit změny</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal-content modal-solid">
            <div class="dropdown-header">
                <h3 class="text-danger"><i class="ph ph-warning"></i> Smazat záznam?</h3>
                <button id="close-delete-cross" class="btn-icon"><i class="ph ph-x"></i></button>
            </div>
            <p class="text-secondary">Tato akce je nevratná.</p>
            <div class="header-actions modal-actions">
                <button id="close-delete-btn" class="btn">Zrušit</button>
                <button id="confirm-delete-btn" class="btn btn-danger">Ano, smazat</button>
            </div>
        </div>
    </div>

    <nav id="mobile-fullscreen-menu" class="mobile-menu-fullscreen mobile-only">
        <div class="mobile-menu-top">
            <div class="flex-center-gap">
                <i class="ph ph-user-circle icon-xl-secondary"></i>
                <div style="display: flex; flex-direction: column; align-items: flex-start; overflow: hidden;">
                    <h2 class="mobile-user-name text-truncate" style="max-width: 200px;">Jméno Brigádníka</h2>
                    <button class="btn-text-small mt-15" style="margin-top: 2px;"><i class="ph ph-pencil-simple"></i> Upravit profil</button>
                </div>
            </div>
            <button id="close-mobile-menu-btn" class="btn-icon"><i class="ph ph-x icon-burger-size"></i></button>
        </div>
        
        <div class="mobile-menu-links">
            <button id="show-stats-btn" class="btn btn-ghost btn-mobile-menu"><i class="ph ph-chart-pie-slice"></i> Aktuální přehled</button>
            <button id="show-yearly-btn" class="btn btn-ghost btn-mobile-menu"><i class="ph ph-calendar-star"></i> Roční souhrny</button>
        </div>

        <div class="mobile-menu-bottom">
            <button id="mobile-theme-toggle" class="btn-icon"><i class="ph ph-moon icon-menu-size" id="mobile-theme-icon"></i></button>
            <button id="mobile-logout-btn" class="btn-icon text-danger"><i class="ph ph-sign-out icon-menu-size"></i></button>
        </div>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
