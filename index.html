<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Recorder</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>
    <div id="login-section">
        <h2>Přihlášení</h2>
        <input type="email" id="email" placeholder="Tvůj e-mail">
        <input type="password" id="password" placeholder="Heslo">
        <button id="login-btn">Přihlásit se</button>
        <p id="login-error" style="color: red; display: none;">Špatné jméno nebo heslo.</p>
    </div>

    <div id="app-section" style="display: none;">
        <div class="header">
            <h2>Můj deník</h2>
            <button id="logout-btn">Odhlásit</button>
        </div>

        <div class="form-container">
            <h3>Nový záznam</h3>
            <input type="date" id="dateInput">
            <input type="number" id="hoursInput" placeholder="Počet hodin" step="0.5">
            <input type="text" id="descInput" placeholder="Co jsi dělal? (např. sekání trávy)">
            <button id="add-record-btn">Uložit záznam</button>
        </div>

        <div class="filters-container">
            <h3>Filtry a Export</h3>
            <label for="monthFilter">Měsíc:</label>
            <input type="month" id="monthFilter">
            <button id="clear-filter-btn">Zrušit filtr</button>
            <button id="export-btn" style="background-color: #28a745; color: white;">Exportovat do Excelu</button>
        </div>

        <div class="records-container">
            <h3>Záznamy</h3>
            <ul id="records-list"></ul>
        </div>
    </div>

    <div id="toast" class="toast hidden">Uloženo!</div>

    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Upravit záznam</h3>
            <input type="date" id="editDateInput">
            <input type="number" id="editHoursInput" placeholder="Počet hodin" step="0.5">
            <input type="text" id="editDescInput" placeholder="Co jsi dělal?">
            <div class="modal-buttons">
                <button id="save-edit-btn" style="background-color: #28a745;">Uložit změny</button>
                <button id="close-edit-btn" style="background-color: #6c757d;">Zrušit</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Opravdu smazat?</h3>
            <p>Tento záznam bude trvale odstraněn.</p>
            <div class="modal-buttons">
                <button id="confirm-delete-btn" style="background-color: #dc3545;">Ano, smazat</button>
                <button id="close-delete-btn" style="background-color: #6c757d;">Zrušit</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
