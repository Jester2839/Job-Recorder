<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Recorder</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div id="login-section" class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
        <h2 style="margin-bottom: 20px;">Přihlášení</h2>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="email" id="email" placeholder="Tvůj e-mail">
            <input type="password" id="password" placeholder="Heslo">
            <button id="login-btn" class="btn btn-primary" style="justify-content: center;">Přihlásit se</button>
        </div>
        <p id="login-error" style="color: red; display: none; margin-top: 10px;">Špatné jméno nebo heslo.</p>
    </div>

    <div id="app-section" style="display: none;">
        
        <header style="background-color: var(--bg-surface); padding: 15px 20px; box-shadow: var(--box-shadow); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0; display: flex; align-items: center; gap: 8px;">
                <i class="ph ph-plant" style="color: var(--primary-color);"></i>
                Job Recorder
            </h1>
            <div style="display: flex; gap: 15px; align-items: center; position: relative;">
                <button id="theme-toggle" class="btn-icon"><i class="ph ph-moon" id="theme-icon"></i></button>
                
                <div id="user-menu-wrapper" style="position: relative;">
                    <button id="user-menu-btn" class="btn-icon"><i class="ph ph-user-circle"></i></button>
                    
                    <div id="user-dropdown" class="card hidden" style="position: absolute; right: 0; top: 100%; margin-top: 10px; width: 200px; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 100;">
                        <div style="display: flex; align-items: center; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);">
                            <i class="ph ph-user-circle" style="font-size: 2rem; color: var(--primary-color);"></i>
                            <strong>Můj Profil</strong>
                        </div>
                        <button class="btn" style="background-color: var(--bg-main); color: var(--text-primary); border: 1px solid var(--border-color); justify-content: flex-start;">
                            <i class="ph ph-pencil-simple"></i> Upravit profil
                        </button>
                        <button id="logout-btn" class="btn" style="background-color: transparent; color: var(--danger-color); justify-content: flex-start; padding-left: 0;">
                            <i class="ph ph-sign-out"></i> Odhlásit se
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
            
            <button id="open-add-modal-btn" class="btn btn-primary" style="margin-bottom: 15px;">Přidat záznam</button>

            <div class="card" id="toolbar-container" style="display: flex; flex-direction: column; gap: 15px;">
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <div style="flex-grow: 1; position: relative; min-width: 200px;">
                        <i class="ph ph-magnifying-glass" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                        <input type="text" id="searchInput" placeholder="Hledat v poznámkách a činnostech..." style="width: 100%; padding-left: 35px; border-radius: 8px;">
                    </div>
                    
                    <select id="sortInput" style="padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--bg-main); color: var(--text-primary); font-family: var(--font-family); cursor: pointer;">
                        <option value="desc">Nejnovější</option>
                        <option value="asc">Nejstarší</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                    
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <i class="ph ph-calendar-blank" style="color: var(--text-secondary);" title="Měsíc a Rok"></i>
                        <input type="month" id="monthFilter" style="border-radius: 8px;">
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <i class="ph ph-calendar-check" style="color: var(--text-secondary);" title="Přesný den"></i>
                        <input type="date" id="exactDateFilter" style="border-radius: 8px;">
                    </div>

                    <div style="display: flex; align-items: center; gap: 5px;">
                        <i class="ph ph-tag" style="color: var(--text-secondary);" title="Činnost"></i>
                        <input type="text" id="activityFilter" placeholder="Činnost..." style="width: 130px; border-radius: 8px;">
                    </div>

                    <button id="clear-filter-btn" class="btn" style="background-color: transparent; border: 1px solid var(--border-color); color: var(--text-primary); margin-left: auto;">
                        <i class="ph ph-x"></i> Zrušit filtry
                    </button>

                    <button id="export-btn" class="btn" style="background-color: #28a745; color: white;">
                        <i class="ph ph-file-xls"></i> Exportovat
                    </button>
                </div>
            </div>

            <div class="card records-container">
                <h3><i class="ph ph-list-dashes"></i> Záznamy</h3>
                <div id="records-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden">Uloženo!</div>


    <div id="add-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3><i class="ph ph-plus-circle"></i> Nový záznam</h3>
                <button id="close-add-cross" class="btn-icon"><i class="ph ph-x"></i></button>
            </div>
            
            <input type="date" id="dateInput">
            <input type="number" id="hoursInput" placeholder="Počet hodin" step="0.5">
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <input type="text" id="activityInput" placeholder="Činnost (např. ostatní, úklid)">
                <div style="display: flex; gap: 5px; flex-wrap: wrap;" id="quick-tags">
                    <span class="badge" onclick="document.getElementById('activityInput').value='ostatní'">ostatní</span>
                </div>
            </div>

            <input type="text" id="descInput" placeholder="Co jsi dělal? (Poznámka)">
            
            <div class="modal-buttons">
                <button id="add-record-btn" class="btn btn-primary" style="width: 100%; justify-content: center;">Uložit záznam</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Upravit záznam</h3>
            <input type="date" id="editDateInput">
            <input type="number" id="editHoursInput" placeholder="Počet hodin" step="0.5">
            <input type="text" id="editActivityInput" placeholder="Činnost (např. ostatní, úklid)">
            <input type="text" id="editDescInput" placeholder="Co jsi dělal?">
            <div class="modal-buttons">
                <button id="save-edit-btn" class="btn btn-primary" style="justify-content: center;">Uložit změny</button>
                <button id="close-edit-btn" class="btn" style="background-color: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-primary);">Zrušit</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Opravdu smazat?</h3>
            <p>Tento záznam bude trvale odstraněn.</p>
            <div class="modal-buttons">
                <button id="confirm-delete-btn" class="btn" style="background-color: #dc3545; color: white;">Ano, smazat</button>
                <button id="close-delete-btn" class="btn" style="background-color: #6c757d; color: white;">Zrušit</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
